# Production environment overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: relay44-production

resources:
  - ../base

configMapGenerator:
  - name: relay44-config
    behavior: merge
    literals:
      - base-rpc-url=https://mainnet.base.org
      - base-chain-id=8453
      - environment=production
      - log-level=info

replicas:
  - name: relay44-api-blue
    count: 3

images:
  - name: relay44/api
    newName: ghcr.io/relay44/backend

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
    target:
      kind: Deployment
      name: relay44-api-blue

  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: relay44.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: relay44.com
      - op: replace
        path: /spec/tls/0/secretName
        value: relay44-api-tls
    target:
      kind: Ingress
      name: relay44-api

  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20
    target:
      kind: HorizontalPodAutoscaler
      name: relay44-api-blue

  - patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 2
    target:
      kind: PodDisruptionBudget
      name: relay44-api
