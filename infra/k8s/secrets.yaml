# Relay44 Secrets Configuration
#
# In production, use a secrets manager like:
# - AWS Secrets Manager with External Secrets Operator
# - HashiCorp Vault
# - Sealed Secrets
#
# This file is a template - DO NOT commit actual secrets

---
# External Secrets Operator configuration (recommended)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: relay44-secrets
  namespace: relay44
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: relay44-secrets
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: relay44/production
        property: database_url
    - secretKey: redis-url
      remoteRef:
        key: relay44/production
        property: redis_url
    - secretKey: jwt-secret
      remoteRef:
        key: relay44/production
        property: jwt_secret

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: relay44-config
  namespace: relay44
data:
  base-rpc-url: "https://mainnet.base.org"
  base-chain-id: "8453"

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: relay44-api
  namespace: relay44
  annotations:
    # For AWS IAM roles for service accounts
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/relay44-api

---
