<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="480" viewBox="0 0 1400 480" role="img" aria-labelledby="title desc">
  <title id="title">relay44 architecture</title>
  <desc id="desc">Browser and web client connect through the Rust API to Base contracts, PostgreSQL, Redis, and the x402 facilitator. Operator automation targets the API.</desc>
  <rect width="1400" height="480" rx="18" fill="#ffffff"/>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#111111"/>
    </marker>
  </defs>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#111111">

    <!-- public edge zone -->
    <text x="82" y="58" font-size="16" font-weight="700" letter-spacing="1.2">public edge</text>
    <rect x="60" y="74" width="300" height="290" rx="10" fill="#f7f3ea" stroke="#111111" stroke-width="3"/>

    <rect x="110" y="130" width="190" height="56" rx="8" fill="#ffffff" stroke="#111111" stroke-width="3"/>
    <text x="205" y="164" text-anchor="middle" font-size="20" font-weight="700">browser</text>

    <rect x="110" y="248" width="190" height="56" rx="8" fill="#ffffff" stroke="#111111" stroke-width="3"/>
    <text x="205" y="282" text-anchor="middle" font-size="20" font-weight="700">web client</text>

    <!-- API hub -->
    <rect x="470" y="140" width="190" height="178" rx="10" fill="#f3efe7" stroke="#111111" stroke-width="3"/>
    <text x="565" y="232" text-anchor="middle" font-size="22" font-weight="700">rust api</text>
    <text x="565" y="254" text-anchor="middle" font-size="13" fill="#555555">actix-web</text>

    <!-- execution core zone -->
    <text x="782" y="58" font-size="16" font-weight="700" letter-spacing="1.2">execution core</text>
    <rect x="770" y="74" width="570" height="290" rx="10" fill="#f7f3ea" stroke="#111111" stroke-width="3"/>

    <!-- top row -->
    <rect x="830" y="106" width="220" height="56" rx="8" fill="#ffffff" stroke="#111111" stroke-width="3"/>
    <text x="940" y="140" text-anchor="middle" font-size="20" font-weight="700">base contracts</text>

    <rect x="1100" y="106" width="220" height="56" rx="8" fill="#ffffff" stroke="#111111" stroke-width="3"/>
    <text x="1210" y="140" text-anchor="middle" font-size="20" font-weight="700">x402 facilitator</text>

    <!-- bottom row -->
    <rect x="830" y="226" width="220" height="56" rx="8" fill="#ffffff" stroke="#111111" stroke-width="3"/>
    <text x="940" y="260" text-anchor="middle" font-size="20" font-weight="700">postgresql</text>

    <rect x="1100" y="226" width="220" height="56" rx="8" fill="#ffffff" stroke="#111111" stroke-width="3"/>
    <text x="1210" y="260" text-anchor="middle" font-size="20" font-weight="700">redis</text>

    <!-- operator -->
    <rect x="460" y="410" width="210" height="52" rx="8" fill="#f3efe7" stroke="#111111" stroke-width="3"/>
    <text x="565" y="442" text-anchor="middle" font-size="18" font-weight="700">operator agents</text>
  </g>

  <!-- arrows -->
  <g stroke="#111111" stroke-width="3" fill="none" marker-end="url(#ar)">
    <!-- browser → web client -->
    <line x1="205" y1="186" x2="205" y2="243"/>

    <!-- web client → API -->
    <polyline points="300,276 390,276 390,240 465,240"/>

    <!-- API → base contracts (top-left of grid) -->
    <polyline points="660,190 745,190 745,134 825,134"/>

    <!-- API → postgresql (bottom-left of grid) -->
    <polyline points="660,254 825,254"/>

    <!-- API → x402 (top-right: go up above grid, then across) -->
    <polyline points="660,175 710,175 710,90 1210,90 1210,101"/>

    <!-- API → redis (bottom-right: go down below grid, then across) -->
    <polyline points="660,270 710,270 710,340 1210,340 1210,287"/>
  </g>

  <!-- operator → API (upward arrow) -->
  <g stroke="#111111" stroke-width="3" fill="none" marker-end="url(#ar)">
    <line x1="565" y1="410" x2="565" y2="323"/>
  </g>
</svg>
