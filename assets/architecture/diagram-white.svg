    <polygon points="838,307 822,299 822,315" fill="#111111"/>

    <polyline points="688,251 1032,251 1032,191 1088,191"/>
    <polygon points="1088,191 1072,183 1072,199" fill="#111111"/>

    <polyline points="688,251 1032,251 1032,307 1088,307"/>
    <polygon points="1088,307 1072,299 1072,315" fill="#111111"/>

    <polyline points="708,466 764,466 764,251 540,251"/>
