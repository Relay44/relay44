<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="540" viewBox="0 0 1400 540" role="img" aria-labelledby="title desc">
  <title id="title">relay44 architecture</title>
  <desc id="desc">Public edge connects browser and web client to the Rust API, which connects into the execution core of Base contracts, Postgres, Redis, and the x402 facilitator. Operator automation also targets the API.</desc>
  <rect width="1400" height="540" rx="18" fill="#ffffff"/>
  <rect x="36" y="36" width="1328" height="468" rx="18" fill="#ffffff" stroke="#111111" stroke-width="4"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#111111">
    <text x="82" y="92" font-size="18" font-weight="700" letter-spacing="1.2">public edge</text>
    <rect x="70" y="110" width="480" height="290" rx="10" fill="#f7f3ea" stroke="#111111" stroke-width="4"/>

    <text x="802" y="92" font-size="18" font-weight="700" letter-spacing="1.2">execution core</text>
    <rect x="790" y="110" width="530" height="340" rx="10" fill="#f7f3ea" stroke="#111111" stroke-width="4"/>

    <rect x="108" y="214" width="148" height="74" rx="8" fill="#f3efe7" stroke="#111111" stroke-width="4"/>
    <text x="182" y="258" text-anchor="middle" font-size="22" font-weight="700">browser</text>
    <text x="182" y="283" text-anchor="middle" font-size="22" font-weight="700">/ wallet</text>

    <rect x="325" y="214" width="148" height="74" rx="8" fill="#f3efe7" stroke="#111111" stroke-width="4"/>
    <text x="399" y="258" text-anchor="middle" font-size="22" font-weight="700">web client</text>

    <rect x="540" y="214" width="148" height="74" rx="8" fill="#f3efe7" stroke="#111111" stroke-width="4"/>
    <text x="614" y="258" text-anchor="middle" font-size="22" font-weight="700">rust api</text>

    <rect x="838" y="152" width="186" height="78" rx="8" fill="#f3efe7" stroke="#111111" stroke-width="4"/>
    <text x="931" y="198" text-anchor="middle" font-size="22" font-weight="700">base contracts</text>

    <rect x="838" y="268" width="186" height="78" rx="8" fill="#ffffff" stroke="#111111" stroke-width="4"/>
    <text x="931" y="315" text-anchor="middle" font-size="22" font-weight="700">postgres</text>

    <rect x="1088" y="152" width="186" height="78" rx="8" fill="#ffffff" stroke="#111111" stroke-width="4"/>
    <text x="1181" y="198" text-anchor="middle" font-size="22" font-weight="700">redis</text>

    <rect x="1088" y="268" width="186" height="78" rx="8" fill="#e4470b" stroke="#111111" stroke-width="4"/>
    <text x="1181" y="315" text-anchor="middle" font-size="22" font-weight="700">x402 facilitator</text>

    <rect x="470" y="430" width="238" height="72" rx="8" fill="#f3efe7" stroke="#111111" stroke-width="4"/>
    <text x="589" y="474" text-anchor="middle" font-size="22" font-weight="700">operator / automation</text>
  </g>

  <g stroke="#111111" stroke-width="4" fill="none" stroke-linecap="square">
    <line x1="256" y1="251" x2="325" y2="251"/>
    <polygon points="325,251 309,243 309,259" fill="#111111"/>

    <line x1="473" y1="251" x2="540" y2="251"/>
    <polygon points="540,251 524,243 524,259" fill="#111111"/>

    <polyline points="688,251 782,251 782,184 838,184"/>
