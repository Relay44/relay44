name: identity-firewall

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enforce identity separation
        shell: bash
        env:
          IDENTITY_FIREWALL_FORBIDDEN: ${{ secrets.IDENTITY_FIREWALL_FORBIDDEN }}
        run: |
          set -euo pipefail

          # The forbidden token is stored in a repository-level Actions secret
          # so it never appears in the public source tree. Each participating
          # repo sets IDENTITY_FIREWALL_FORBIDDEN to the identifier that must
          # not leak into any of its commits (author name, email, committer,
          # or message).
          if [[ -z "${IDENTITY_FIREWALL_FORBIDDEN:-}" ]]; then
            echo "identity-firewall: no IDENTITY_FIREWALL_FORBIDDEN secret configured, skipping"
            exit 0
          fi

          forbidden="$(printf '%s' "$IDENTITY_FIREWALL_FORBIDDEN" | tr '[:upper:]' '[:lower:]')"

          if [[ -z "$forbidden" ]]; then
            echo "identity-firewall: forbidden token is empty, skipping"
            exit 0
          fi

          event_name="${{ github.event_name }}"
          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          range=""

          if [[ "$event_name" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            if [[ -n "$base_sha" && -n "$head_sha" ]]; then
              range="$base_sha..$head_sha"
            fi
          elif [[ "$event_name" == "push" ]]; then
            if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]]; then
              range="$before..$after"
            fi
          fi

          mapfile -t commits < <(
            if [[ -n "$range" ]] && git rev-list --no-merges "$range" >/dev/null 2>&1; then
              git rev-list --no-merges "$range"
            elif git rev-parse "$after" >/dev/null 2>&1; then
              git rev-list --no-merges "$after" -n 25
            else
              true
            fi
          )

          if [[ ${#commits[@]} -eq 0 ]]; then
            echo "identity-firewall: no commits to validate"
            exit 0
          fi

          violations=0
          for c in "${commits[@]}"; do
            an="$(git show -s --format='%an' "$c")"
            ae="$(git show -s --format='%ae' "$c")"
            cn="$(git show -s --format='%cn' "$c")"
            ce="$(git show -s --format='%ce' "$c")"
            msg="$(git show -s --format='%s%n%b' "$c")"

            blob="$(printf '%s\n%s\n%s\n%s\n%s\n' "$an" "$ae" "$cn" "$ce" "$msg" | tr '[:upper:]' '[:lower:]')"
            if grep -q "$forbidden" <<<"$blob"; then
              echo "identity-firewall: violation in commit $c"
              echo "  author: $an <$ae>"
              echo "  committer: $cn <$ce>"
              violations=1
            fi
          done

          if [[ $violations -ne 0 ]]; then
            echo "identity-firewall: blocked"
            exit 1
          fi

          echo "identity-firewall: passed"
