name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to rollback"
        required: true
        type: choice
        options:
          - "staging"
          - "production"
      rollback_type:
        description: "Rollback type"
        required: true
        type: choice
        options:
          - "previous"
          - "specific-revision"
          - "specific-image"
        default: "previous"
      revision:
        description: "Revision number (for specific-revision)"
        required: false
        type: string
      image_tag:
        description: "Image tag (for specific-image)"
        required: false
        type: string
      reason:
        description: "Reason for rollback"
        required: true
        type: string

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend
  KUBE_NAMESPACE_PREFIX: ${{ vars.KUBE_NAMESPACE_PREFIX }}
  KUBE_DEPLOYMENT_NAME: ${{ vars.KUBE_DEPLOYMENT_NAME }}
  PROD_HEALTHCHECK_URL: ${{ vars.PROD_HEALTHCHECK_URL }}
  STAGING_HEALTHCHECK_URL: ${{ vars.STAGING_HEALTHCHECK_URL }}

jobs:
  rollback:
    name: Rollback ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}-rollback
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          else
            echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Get current state
        id: current
        run: |
          namespace_prefix="${KUBE_NAMESPACE_PREFIX:-relay44}"
          deployment_name="${KUBE_DEPLOYMENT_NAME:-relay44-api}"
          namespace="${namespace_prefix}-${{ github.event.inputs.environment }}"

          current_image="$(kubectl get deployment "$deployment_name" -n "$namespace" \
            -o jsonpath='{.spec.template.spec.containers[0].image}')"
          current_revision="$(kubectl rollout history "deployment/${deployment_name}" \
            -n "$namespace" | tail -1 | awk '{print $1}')"
          replicas="$(kubectl get deployment "$deployment_name" -n "$namespace" \
            -o jsonpath='{.status.readyReplicas}')"

          echo "current_image=$current_image" >> "$GITHUB_OUTPUT"
          echo "current_revision=$current_revision" >> "$GITHUB_OUTPUT"
          echo "current_replicas=$replicas" >> "$GITHUB_OUTPUT"

          echo "Current state:"
          echo "  Namespace: $namespace"
          echo "  Deployment: $deployment_name"
          echo "  Image: $current_image"
          echo "  Revision: $current_revision"
          echo "  Ready replicas: $replicas"

      - name: Show rollout history
        run: |
          namespace_prefix="${KUBE_NAMESPACE_PREFIX:-relay44}"
          deployment_name="${KUBE_DEPLOYMENT_NAME:-relay44-api}"
          namespace="${namespace_prefix}-${{ github.event.inputs.environment }}"
          kubectl rollout history "deployment/${deployment_name}" -n "$namespace"

      - name: Rollback to previous
        if: github.event.inputs.rollback_type == 'previous'
        run: |
          namespace_prefix="${KUBE_NAMESPACE_PREFIX:-relay44}"
          deployment_name="${KUBE_DEPLOYMENT_NAME:-relay44-api}"
          namespace="${namespace_prefix}-${{ github.event.inputs.environment }}"

          kubectl rollout undo "deployment/${deployment_name}" -n "$namespace"
          kubectl rollout status "deployment/${deployment_name}" -n "$namespace" --timeout=300s

      - name: Rollback to specific revision
        if: github.event.inputs.rollback_type == 'specific-revision'
        run: |
          namespace_prefix="${KUBE_NAMESPACE_PREFIX:-relay44}"
          deployment_name="${KUBE_DEPLOYMENT_NAME:-relay44-api}"
          namespace="${namespace_prefix}-${{ github.event.inputs.environment }}"
          revision="${{ github.event.inputs.revision }}"

          if [[ -z "$revision" ]]; then
            echo "::error::Revision number is required for specific-revision rollback"
            exit 1
          fi

          kubectl rollout undo "deployment/${deployment_name}" -n "$namespace" --to-revision="$revision"
          kubectl rollout status "deployment/${deployment_name}" -n "$namespace" --timeout=300s

      - name: Rollback to specific image
        if: github.event.inputs.rollback_type == 'specific-image'
        run: |
          namespace_prefix="${KUBE_NAMESPACE_PREFIX:-relay44}"
          deployment_name="${KUBE_DEPLOYMENT_NAME:-relay44-api}"
          namespace="${namespace_prefix}-${{ github.event.inputs.environment }}"
          image_tag="${{ github.event.inputs.image_tag }}"

          if [[ -z "$image_tag" ]]; then
            echo "::error::Image tag is required for specific-image rollback"
            exit 1
          fi

