# CI pipeline for relay44-core
#
# Required status checks (configure in GitHub repo settings → Branches → main):
#   - rust
#   - web
#   - solidity
#   - sdk

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Clippy
        run: cargo clippy --package relay44-backend -- -D warnings

      - name: Test
        run: cargo test --package relay44-backend

  web:
    name: web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules and Next.js
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            web/.next/cache
          key: web-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
          restore-keys: web-${{ runner.os }}-

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  sdk:
    name: sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/agent
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: sdk/agent/node_modules
          key: sdk-agent-${{ runner.os }}-${{ hashFiles('sdk/agent/package-lock.json') }}
          restore-keys: sdk-agent-${{ runner.os }}-

      - name: Install deps
        run: npm ci

      - name: ABI parity (SDK ↔ web)
        run: npm run check:abi

      - name: Build
        run: npm run build

  solidity:
    name: solidity
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Cache forge artifacts
        uses: actions/cache@v4
        with:
          path: |
            evm/cache
            evm/out
          key: forge-${{ runner.os }}-${{ hashFiles('evm/foundry.toml', 'evm/src/**/*.sol', 'evm/test/**/*.sol') }}
          restore-keys: forge-${{ runner.os }}-

      - name: Build
        run: forge build

      - name: Test
        run: forge test
