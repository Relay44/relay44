name: Bug report
description: Report a reproducible defect in Relay44.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Provide a minimal, reproducible report. Usage questions and security reports should not use this form.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I confirmed this problem is reproducible from code in this repository.
          required: true
        - label: I checked for existing issues and pull requests before opening this report.
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact steps and inputs needed to reproduce.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: regression
    attributes:
      label: Regression?
      options:
        - "yes"
        - "no"
        - unknown
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - API (app)
        - Contracts (evm)
        - Solana programs (programs)
        - Web (web)
        - SDK (sdk)
        - CI/CD
        - Docs
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runtime, browser, wallet, chain, or local setup details that matter for repro.
      placeholder: |
        OS:
        Browser:
        Node/Rust/Foundry versions:
        Chain or provider:
        Env flags:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs/errors
      description: Paste relevant logs, traces, or screenshots.
      render: shell
  - type: textarea
    id: minimal_repro
    attributes:
      label: Minimal repro asset
      description: Link a minimal PR, gist, failing request, or failing test if you have one.
